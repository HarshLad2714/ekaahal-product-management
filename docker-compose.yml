services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekahal-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ekahal_products
      DB_USERNAME: ekahal
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ekahal

  nginx:
    image: nginx:1.27-alpine
    container_name: ekahal-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ekahal

  mysql:
    image: mysql:8.4
    container_name: ekahal-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ekahal_products
      MYSQL_USER: ekahal
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - ekahal-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ekahal

  node:
    image: node:22-alpine
    container_name: ekahal-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm ci && npm run build"
    profiles:
      - assets

networks:
  ekahal:
    driver: bridge

volumes:
  ekahal-mysql:
